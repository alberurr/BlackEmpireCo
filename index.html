<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Empire Open 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .score-card { background: #111; border: 1px solid #333; border-radius: 8px; }
        /* Colores específicos para los niveles en el select */
        .text-rx { color: #ff4d4d !important; font-weight: bold; }
        .text-s { color: #00d2ff !important; font-weight: bold; }
        .overall-item { border-bottom: 1px solid #222; padding: 10px 0; }
        .overall-item:last-child { border: none; }
        .table thead th { font-size: 0.8rem; letter-spacing: 1px; color: #888; }
        /* Ajuste para que los inputs y selects no se vean amontonados */
        .wod-col { min-width: 80px; }
    </style>
</head>
<body class="bg-dark text-light">

    <div id="admin-banner" class="bg-warning text-dark text-center py-2 d-none">
        <strong>MODO EDICIÓN ACTIVADO</strong>
        <button class="btn btn-sm btn-outline-dark ms-3" onclick="logout()">Cerrar Sesión</button>
    </div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="text-uppercase fw-bold m-0" style="letter-spacing: 2px;">Open 2026</h1>
            <button id="admin-btn" class="btn btn-outline-secondary btn-sm" onclick="promptLogin()">⚙️</button>
        </div>

        <div id="admin-section" class="card card-body bg-secondary mb-4 d-none">
            <h5 class="text-dark fw-bold mb-3">Registrar Nuevo Atleta</h5>
            <div class="row g-2">
                <div class="col-md-8">
                    <input type="text" id="athleteName" class="form-control" placeholder="Nombre completo">
                </div>
                <div class="col-md-2">
                    <select id="athleteGender" class="form-select">
                        <option value="Male">Hombre</option>
                        <option value="Female">Mujer</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100 fw-bold" onclick="registerAthlete()">AÑADIR</button>
                </div>
            </div>
        </div>

        <div class="score-card p-4 mb-5 shadow-lg">
            <h4 class="text-center text-uppercase fw-bold mb-4" style="color: #edff00; letter-spacing: 3px;">Scores Generales</h4>
            <div id="overall-leaderboard">
                </div>
        </div>

        <h3 class="text-info text-uppercase fw-bold h5 mb-3">Leaderboard Masculino</h3>
        <div class="table-responsive mb-5">
            <table class="table table-dark table-hover align-middle">
                <thead>
                    <tr class="text-center">
                        <th style="width: 50px;">#</th>
                        <th class="text-start">Atleta</th>
                        <th class="wod-col">WOD 1</th>
                        <th class="wod-col">WOD 2</th>
                        <th class="wod-col">WOD 3</th>
                        <th style="width: 80px;">Total</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-male">
                    </tbody>
            </table>
        </div>

        <hr class="border-secondary my-5">

        <h3 class="text-danger text-uppercase fw-bold h5 mb-3">Leaderboard Femenino</h3>
        <div class="table-responsive mb-5">
            <table class="table table-dark table-hover align-middle">
                <thead>
                    <tr class="text-center">
                        <th style="width: 50px;">#</th>
                        <th class="text-start">Atleta</th>
                        <th class="wod-col">WOD 1</th>
                        <th class="wod-col">WOD 2</th>
                        <th class="wod-col">WOD 3</th>
                        <th style="width: 80px;">Total</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-female">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/energy-grid.js"></script>
</body>
</html>
