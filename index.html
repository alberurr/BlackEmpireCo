<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Empire Open 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .badge-rx { background-color: #ff4d4d; color: white; }
        .badge-s { background-color: #00d2ff; color: #000; }
        .overall-section { border: 1px solid #444; border-radius: 10px; padding: 20px; background: #1a1a1a; }
    </style>
</head>
<body class="bg-dark text-light">

    <div id="admin-banner" class="bg-warning text-dark text-center py-2 d-none">
        <strong>MODO EDICIÓN ACTIVADO</strong>
        <button class="btn btn-sm btn-outline-dark ms-3" onclick="logout()">Cerrar Sesión</button>
    </div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="text-uppercase fw-bold m-0">Open 2026</h1>
            <button id="admin-btn" class="btn btn-outline-secondary btn-sm" onclick="promptLogin()">⚙️</button>
        </div>

        <div id="admin-section" class="card card-body bg-secondary mb-4 d-none">
            <h5 class="text-dark fw-bold">Registrar Atleta</h5>
            <div class="row g-2">
                <div class="col-md-4">
                    <input type="text" id="athleteName" class="form-control" placeholder="Nombre completo">
                </div>
                <div class="col-md-3">
                    <select id="athleteGender" class="form-select">
                        <option value="Male">Hombre</option>
                        <option value="Female">Mujer</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select id="athleteLevel" class="form-select">
                        <option value="RX">RX</option>
                        <option value="Scaled">Escalado</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100 fw-bold" onclick="registerAthlete()">REGISTRAR</button>
                </div>
            </div>
        </div>

        <div class="overall-section mb-5 shadow">
            <h3 class="text-center text-warning text-uppercase fw-bold">Top General Scores</h3>
            <p class="text-center text-muted small">Los mejores puntajes de toda la competencia</p>
            <div class="table-responsive">
                <table class="table table-dark table-sm mb-0">
                    <thead>
                        <tr class="text-muted">
                            <th>POS</th>
                            <th>ATLETA</th>
                            <th>GÉNERO</th>
                            <th class="text-end">TOTAL</th>
                        </tr>
                    </thead>
                    <tbody id="overall-leaderboard">
                        </tbody>
                </table>
            </div>
        </div>

        <hr class="border-secondary my-5">

        <h3 class="text-info text-uppercase fw-bold mb-3">Hombres</h3>
        <div class="table-responsive mb-5">
            <table class="table table-dark table-hover border-secondary">
                <thead>
                    <tr>
                        <th style="width: 50px;">#</th>
                        <th>Atleta</th>
                        <th>W1</th>
                        <th>W2</th>
                        <th>W3</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-male"></tbody>
            </table>
        </div>

        <h3 class="text-danger text-uppercase fw-bold mb-3">Mujeres</h3>
        <div class="table-responsive mb-5">
            <table class="table table-dark table-hover border-secondary">
                <thead>
                    <tr>
                        <th style="width: 50px;">#</th>
                        <th>Atleta</th>
                        <th>W1</th>
                        <th>W2</th>
                        <th>W3</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-female"></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="energy-grid.js"></script>
</body>
</html>
