<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Empire Open 2026 - Leaderboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light">

    <div id="admin-banner" class="bg-warning text-dark text-center py-2 d-none">
        <strong>MODO EDICIÓN ACTIVADO</strong>
        <button class="btn btn-sm btn-outline-dark ms-3" onclick="logout()">Cerrar Sesión</button>
    </div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="text-uppercase fw-bold">Open 2026 Leaderboard</h1>
            <button id="admin-btn" class="btn btn-outline-secondary btn-sm" onclick="promptLogin()">⚙️</button>
        </div>

        <div id="admin-section" class="card card-body bg-secondary mb-4 d-none">
            <h5>Agregar Nuevo Atleta</h5>
            <div class="row g-2">
                <div class="col-md-4">
                    <input type="text" id="athleteName" class="form-control" placeholder="Nombre completo">
                </div>
                <div class="col-md-3">
                    <select id="athleteGender" class="form-select">
                        <option value="Male">Hombre</option>
                        <option value="Female">Mujer</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select id="athleteLevel" class="form-select">
                        <option value="RX">RX</option>
                        <option value="Scaled">Escalado</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100" onclick="registerAthlete()">Registrar</button>
                </div>
            </div>
        </div>

        <ul class="nav nav-tabs mb-3" id="genderTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active text-uppercase" id="male-tab" data-bs-toggle="tab" data-bs-target="#male-panel" type="button">Hombres</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link text-uppercase" id="female-tab" data-bs-toggle="tab" data-bs-target="#female-panel" type="button">Mujeres</button>
            </li>
        </ul>

        <div class="tab-content" id="genderTabsContent">
            <div class="tab-pane fade show active" id="male-panel" role="tabpanel">
                <div class="table-responsive">
                    <table class="table table-dark table-hover align-middle">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Atleta</th>
                                <th>WOD 1</th>
                                <th>WOD 2</th>
                                <th>WOD 3</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-male">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="tab-pane fade" id="female-panel" role="tabpanel">
                <div class="table-responsive">
                    <table class="table table-dark table-hover align-middle">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Atleta</th>
                                <th>WOD 1</th>
                                <th>WOD 2</th>
                                <th>WOD 3</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-female">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="energy-grid.js"></script>
</body>
</html>
