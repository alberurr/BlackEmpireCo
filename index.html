<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Empire Co - Leaderboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div id="admin-banner" class="edit-banner d-none">
        MODO EDICIÓN ACTIVO 
        <button id="exitEditBtn" onclick="logout()">Cerrar Sesión</button>
    </div>

    <div class="app-footer">
        <span class="text-muted small">© 2026 Black Empire Co</span>
        <button id="editAccessBtn" onclick="promptLogin()">
            <i class="fas fa-cog"></i>
        </button>
    </div>

    <div class="app container py-5">
        <div class="header-title-container">
            <h1 class="header-title">Open 2026</h1>
            <p class="panel-subtitle">Leaderboard Oficial</p>
        </div>

        <div id="admin-section" class="panel d-none">
            <h3 class="panel-title">Registrar Atleta</h3>
            <div id="addAthleteForm" class="row g-2">
                <div class="col-md-6">
                    <input type="text" id="athleteName" class="form-control" placeholder="Nombre completo">
                </div>
                <div class="col-md-3">
                    <select id="athleteGender" class="form-select">
                        <option value="Male">Hombre</option>
                        <option value="Female">Mujer</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button onclick="registerAthlete()" class="w-100">Agregar Atleta</button>
                </div>
            </div>
        </div>

        <ul class="nav nav-tabs mb-4" id="leaderboardTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="top-tab" data-bs-toggle="tab" data-bs-target="#tab-top">Top 10</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="male-tab" data-bs-toggle="tab" data-bs-target="#tab-male">Hombres</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="female-tab" data-bs-toggle="tab" data-bs-target="#tab-female">Mujeres</button>
            </li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="tab-top">
                <div id="overall-leaderboard">
                    </div>
            </div>

            <div class="tab-pane fade" id="tab-male">
                <div id="leaderboard-male">
                    </div>
            </div>

            <div class="tab-pane fade" id="tab-female">
                <div id="leaderboard-female">
                    </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script type="module" src="js/energy-grid.js?v=6.0"></script>
</body>
</html>
