<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Empire Open 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .score-card { background: #111; border: 1px solid #333; border-radius: 8px; }
        .text-rx { color: #ff4d4d; font-weight: bold; font-size: 0.8rem; }
        .text-s { color: #00d2ff; font-weight: bold; font-size: 0.8rem; }
        .table thead th { border-bottom: 2px solid #444; color: #aaa; text-transform: uppercase; font-size: 0.85rem; }
        .overall-item { border-bottom: 1px solid #222; padding: 8px 0; }
        .overall-item:last-child { border: none; }
    </style>
</head>
<body class="bg-dark text-light">

    <div id="admin-banner" class="bg-warning text-dark text-center py-2 d-none">
        <strong>MODO EDICIÓN ACTIVADO</strong>
        <button class="btn btn-sm btn-outline-dark ms-3" onclick="logout()">Cerrar Sesión</button>
    </div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="text-uppercase fw-bold m-0" style="letter-spacing: 2px;">Open 2026</h1>
            <button id="admin-btn" class="btn btn-outline-secondary btn-sm" onclick="promptLogin()">⚙️</button>
        </div>

        <div id="admin-section" class="card card-body bg-secondary mb-4 d-none">
            <div class="row g-2">
                <div class="col-md-4"><input type="text" id="athleteName" class="form-control" placeholder="Nombre"></div>
                <div class="col-md-3">
                    <select id="athleteGender" class="form-select">
                        <option value="Male">Hombre</option>
                        <option value="Female">Mujer</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select id="athleteLevel" class="form-select">
                        <option value="RX">RX</option>
                        <option value="Scaled">Escalado</option>
                    </select>
                </div>
                <div class="col-md-2"><button class="btn btn-primary w-100" onclick="registerAthlete()">AÑADIR</button></div>
            </div>
        </div>

        <div class="score-card p-4 mb-5">
            <h4 class="text-center text-uppercase fw-bold mb-4" style="color: #edff00;">Scores Generales</h4>
            <div id="overall-leaderboard">
                </div>
        </div>

        <div class="row">
            <div class="col-lg-6 mb-5">
                <h3 class="text-info text-uppercase fw-bold h5 mb-3">Leaderboard Masculino</h3>
                <div class="table-responsive">
                    <table class="table table-dark table-hover">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Atleta</th>
                                <th class="text-center">WODS</th>
                                <th class="text-end">Total</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-male"></tbody>
                    </table>
                </div>
            </div>

            <div class="col-lg-6 mb-5">
                <h3 class="text-danger text-uppercase fw-bold h5 mb-3">Leaderboard Femenino</h3>
                <div class="table-responsive">
                    <table class="table table-dark table-hover">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Atleta</th>
                                <th class="text-center">WODS</th>
                                <th class="text-end">Total</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-female"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/energy-grid.js"></script>
</body>
</html>
